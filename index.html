<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Social Soundboard</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #161b22; border-bottom: 1px solid #30363d; }
        .view { padding: 30px; display: none; }
        .active { display: block; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .pfp { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #58a6ff; }
        input, button { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <h2 onclick="showView('home-view')" style="cursor:pointer;">🎵 Soundboard</h2>
    <div id="auth-box"><button id="login-btn">Login with Google</button></div>
    <div id="user-box" style="display:none; align-items:center; gap:15px;">
        <span id="uName"></span>
        <img id="uPfp" class="pfp" style="width:40px; height:40px;">
        <button onclick="showView('dashboard-view')" style="width:auto;">My Dashboard</button>
    </div>
</nav>

<div id="home-view" class="view active">
    <h1>👥 Creators</h1>
    <input type="text" id="search-bar" placeholder="Search usernames...">
    <div id="creators-grid" class="grid"></div>
</div>

<div id="dashboard-view" class="view">
    <div class="card" style="max-width:400px; margin:auto;">
        <h1>Upload Sound</h1>
        <input type="text" id="sName" placeholder="Sound Name">
        <input type="file" id="aFile" accept="audio/*">
        <button onclick="uploadSound()">Upload to Community</button>
    </div>
</div>

<script type="module">
    // CORRECTED CDN PATHS
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIpJ5FFTWp8MmSfVEYbq9-1LfnWXLceT8",
        authDomain: "contcommunitysounds.firebaseapp.com",
        projectId: "contcommunitysounds",
        storageBucket: "contcommunitysounds.firebasestorage.app",
        appId: "1:534535266185:web:dbf16cf4f6c3ca6d614b58"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    window.showView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    // Load Creators List
    onSnapshot(collection(db, "users"), (snap) => {
        const grid = document.getElementById('creators-grid');
        grid.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            grid.innerHTML += `<div class="card"><img src="${d.photoURL}" class="pfp"><h3>${d.username}</h3></div>`;
        });
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('user-box').style.display = 'flex';
            document.getElementById('uName').innerText = user.displayName;
            document.getElementById('uPfp').src = user.photoURL;
        }
    });

    document.getElementById("login-btn").onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    
    window.uploadSound = async () => {
        const name = document.getElementById('sName').value;
        const file = document.getElementById('aFile').files[0];
        const sRef = ref(storage, 'sounds/' + Date.now() + file.name);
        await uploadBytes(sRef, file);
        const url = await getDownloadURL(sRef);
        await addDoc(collection(db, "sounds"), { name, audioUrl: url, uploader: auth.currentUser.displayName });
        alert("Sound Uploaded!");
    };
</script>
</body>
</html>
