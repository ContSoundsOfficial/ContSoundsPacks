<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Social Soundboard</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 20px; background: #111827; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1f2937; padding: 15px; border-radius: 10px; text-align: center; }
        .card img { width: 100px; height: 100px; border-radius: 50%; }
        #app, #profile-view { display: none; }
    </style>
</head>
<body>

<nav>
    <h2 onclick="location.reload()">🎵 Social Soundboard</h2>
    <div id="user-auth">
        <button id="login-btn">Login with Google</button>
    </div>
</nav>

<div id="app">
    <h1>🔥 Trending Sounds</h1>
    <div id="feed" class="grid"></div>
</div>

<div id="profile-view" style="padding: 20px;">
    <h2>Add sounds for your community!</h2>
    <input type="text" id="soundName" placeholder="Sound Name"><br>
    <input type="file" id="audioFile" accept="audio/*"><br>
    <input type="file" id="pfpFile" accept="image/*"><br>
    <button onclick="uploadSound()">Upload Sound</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIpJ5FFTWp8MmSfVEYbq9-1LfnWXLceT8",
        authDomain: "contcommunitysounds.firebaseapp.com",
        projectId: "contcommunitysounds",
        storageBucket: "contcommunitysounds.firebasestorage.app",
        appId: "1:534535266185:web:dbf16cf4f6c3ca6d614b58"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Auth
    document.getElementById("login-btn").onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("app").style.display = "block";
            document.getElementById("profile-view").style.display = "block";
            document.getElementById("user-auth").innerHTML = `<img src="${user.photoURL}" width="40" style="border-radius:50%">`;
            loadFeed();
        }
    });

    // Upload
    window.uploadSound = async () => {
        const file = document.getElementById("audioFile").files[0];
        const img = document.getElementById("pfpFile").files[0];
        const name = document.getElementById("soundName").value;

        const audioRef = ref(storage, 'sounds/' + file.name);
        await uploadBytes(audioRef, file);
        const audioUrl = await getDownloadURL(audioRef);

        const imgRef = ref(storage, 'covers/' + img.name);
        await uploadBytes(imgRef, img);
        const imgUrl = await getDownloadURL(imgRef);

        await addDoc(collection(db, "sounds"), { name, audioUrl, imgUrl, author: auth.currentUser.displayName });
        alert("Uploaded!");
    };

    // Feed
    function loadFeed() {
        onSnapshot(query(collection(db, "sounds")), (snap) => {
            const feed = document.getElementById("feed");
            feed.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                feed.innerHTML += `
                    <div class="card">
                        <img src="${d.imgUrl}">
                        <h3>${d.name}</h3>
                        <p>By ${d.author}</p>
                        <audio controls src="${d.audioUrl}"></audio>
                    </div>`;
            });
        });
    }
</script>

</body>
</html>
