<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Social Soundboard</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #161b22; border-bottom: 1px solid #30363d; }
        .view { padding: 30px; display: none; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #30363d; }
        .pfp { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #58a6ff; }
        input, button { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 6px; }
        button { cursor: pointer; background: #238636; }
    </style>
</head>
<body>

<nav>
    <div style="display:flex; gap:15px;">
        <h2 onclick="showView('home-view')" style="cursor:pointer;">🏠 Home</h2>
    </div>
    <div id="auth-box"><button id="login-btn">Login with Google</button></div>
    <div id="user-box" style="display:none; align-items:center; gap:15px;">
        <span id="uName"></span>
        <img id="uPfp" class="pfp">
        <button onclick="showView('dashboard-view')" style="width:auto;">My Dashboard</button>
    </div>
</nav>

<div id="home-view" class="view active">
    <h1>👥 Creators</h1>
    <input type="text" id="search-bar" placeholder="Search usernames...">
    <div id="creators-grid" class="grid"></div>
</div>

<div id="creator-profile-view" class="view">
    <button onclick="showView('home-view')" style="width:auto;">⬅ Back</button>
    <h1 id="creator-title">Sounds</h1>
    <div id="creator-sounds-grid" class="grid"></div>
</div>

<div id="dashboard-view" class="view">
    <div class="card" style="max-width:400px; margin:auto;">
        <h1>My Dashboard</h1>
        <input type="text" id="sName" placeholder="Sound Name">
        <input type="file" id="aFile" accept="audio/*">
        <button onclick="uploadSound()">Upload Sound</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIpJ5FFTWp8MmSfVEYbq9-1LfnWXLceT8",
        authDomain: "contcommunitysounds.firebaseapp.com",
        projectId: "contcommunitysounds",
        storageBucket: "contcommunitysounds.firebasestorage.app",
        appId: "1:534535266185:web:dbf16cf4f6c3ca6d614b58"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    window.showView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('user-box').style.display = 'flex';
            document.getElementById('uName').innerText = user.displayName;
            document.getElementById('uPfp').src = user.photoURL;
            await setDoc(doc(db, "users", user.uid), { username: user.displayName, photoURL: user.photoURL });
        }
    });

    onSnapshot(collection(db, "users"), (snap) => {
        const grid = document.getElementById('creators-grid');
        grid.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${d.photoURL}" class="pfp"><h3>${d.username}</h3>`;
            const btn = document.createElement('button');
            btn.innerText = "View Sounds";
            btn.onclick = () => loadCreatorSounds(d.username);
            card.appendChild(btn);
            grid.appendChild(card);
        });
    });

    window.loadCreatorSounds = async (username) => {
        document.getElementById('creator-title').innerText = username + "'s Sounds";
        showView('creator-profile-view');
        const q = query(collection(db, "sounds"), where("uploader", "==", username));
        const snap = await getDocs(q);
        const grid = document.getElementById('creator-sounds-grid');
        grid.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            grid.innerHTML += `<div class="card"><h3>${d.name}</h3><audio controls src="${d.audioUrl}"></audio></div>`;
        });
    };

    document.getElementById("search-bar").oninput = (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    };

    window.uploadSound = async () => {
        const name = document.getElementById('sName').value;
        const file = document.getElementById('aFile').files[0];
        const sRef = ref(storage, 'sounds/' + Date.now());
        await uploadBytes(sRef, file);
        await addDoc(collection(db, "sounds"), { name, audioUrl: await getDownloadURL(sRef), uploader: auth.currentUser.displayName });
        alert("Uploaded!");
    };

    document.getElementById("login-btn").onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
</script>
</body>
</html>
