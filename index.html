<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundboard</title>
<style>
    body { margin:0; font-family:Arial; background:#0d1117; color:white; }
    header { background:#111827; padding:25px; text-align:center; }
    .auth-box { text-align: center; padding: 50px; }
    #app { display: none; }
    .search { width:90%; max-width:600px; margin:20px auto; }
    .search input { width:100%; padding:15px; border:none; border-radius:10px; background:#1f2937; color:white; }
    .category { width:90%; margin:auto; margin-bottom:50px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:15px; }
    .sound { background:#1f2937; padding:15px; border-radius:12px; text-align:center; }
    button { margin-top:10px; width:100%; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#3b82f6; color:white; }
    .download { background:#10b981; }
</style>
</head>
<body>

<header><h1>🎵 Soundboard</h1></header>

<div id="auth-section" class="auth-box">
    <button id="login-btn" style="width: auto;">🔐 Login with Google to Access</button>
</div>

<div id="app">
    <div class="search"><input id="search" placeholder="Search sounds..."></div>
    
    <div class="category">
        <h2>🎌 Anime</h2>
        <div class="grid">
            <div class="sound">Ahha <button onclick="play('AnimeSounds/Ahha.mp3')">Play</button></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIpJ5FFTWp8MmSfVEYbq9-1LfnWXLceT8",
        authDomain: "contcommunitysounds.firebaseapp.com",
        projectId: "contcommunitysounds",
        storageBucket: "contcommunitysounds.firebasestorage.app",
        messagingSenderId: "534535266185",
        appId: "1:534535266185:web:dbf16cf4f6c3ca6d614b58"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Login Logic
    document.getElementById("login-btn").onclick = () => {
        signInWithPopup(auth, provider).catch(e => console.error(e));
    };

    // State Listener
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("auth-section").style.display = "none";
            document.getElementById("app").style.display = "block";
        }
    });

    // Audio Playback Logic
    window.play = (file) => {
        new Audio(file).play().catch(e => alert("Audio file not found: " + file));
    };
</script>

</body>
</html>
