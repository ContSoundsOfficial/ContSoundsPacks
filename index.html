<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Social Soundboard</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #161b22; }
        .view { padding: 30px; display: none; }
        .active { display: block; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #30363d; }
        .pfp { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #58a6ff; }
        input, button { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 6px; }
    </style>
</head>
<body>

<nav>
    <h2 onclick="showView('home-view')" style="cursor:pointer;">🎵 Soundboard</h2>
    <div id="auth-box"><button id="login-btn">Login with Google</button></div>
    <div id="user-box" style="display:none; align-items:center; gap:15px;">
        <span id="uName"></span>
        <img id="uPfp" class="pfp">
        <button onclick="showView('dashboard-view')">My Dashboard</button>
    </div>
</nav>

<div id="setup-view" class="view">
    <div class="card" style="max-width:400px; margin:auto;">
        <h1>Setup Profile</h1>
        <input type="text" id="setupName" placeholder="Enter Username">
        <input type="file" id="setupPfp" accept="image/*">
        <button onclick="saveProfile()">Save Profile</button>
    </div>
</div>

<div id="home-view" class="view active">
    <h1>👥 Creators</h1>
    <div id="creators-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:20px;"></div>
</div>

<div id="dashboard-view" class="view">
    <div class="card" style="max-width:400px; margin:auto;">
        <h1>Upload Sound</h1>
        <input type="text" id="sName" placeholder="Sound Name">
        <input type="file" id="aFile" accept="audio/*">
        <input type="file" id="iFile" accept="image/*">
        <button onclick="uploadSound()">Upload to Community</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const app = initializeApp({
        apiKey: "AIzaSyBIpJ5FFTWp8MmSfVEYbq9-1LfnWXLceT8",
        authDomain: "contcommunitysounds.firebaseapp.com",
        projectId: "contcommunitysounds",
        storageBucket: "contcommunitysounds.firebasestorage.app",
        appId: "1:534535266185:web:dbf16cf4f6c3ca6d614b58"
    });

    const auth = getAuth(app), db = getFirestore(app), storage = getStorage(app);

    window.showView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    // SAVE PROFILE
    window.saveProfile = async () => {
        const file = document.getElementById('setupPfp').files[0];
        const pRef = ref(storage, 'pfps/' + auth.currentUser.uid);
        await uploadBytes(pRef, file);
        const url = await getDownloadURL(pRef);
        await setDoc(doc(db, "users", auth.currentUser.uid), {
            username: document.getElementById('setupName').value,
            photoURL: url
        });
        showView('home-view');
    };

    // UPLOAD SOUND
    window.uploadSound = async () => {
        const name = document.getElementById('sName').value;
        const aFile = document.getElementById('aFile').files[0];
        const iFile = document.getElementById('iFile').files[0];
        
        const aRef = ref(storage, 'sounds/' + Date.now());
        const iRef = ref(storage, 'covers/' + Date.now());
        
        await uploadBytes(aRef, aFile);
        await uploadBytes(iRef, iFile);
        
        await addDoc(collection(db, "sounds"), {
            name,
            audioUrl: await getDownloadURL(aRef),
            coverUrl: await getDownloadURL(iRef),
            uploader: auth.currentUser.displayName
        });
        alert("Sound Uploaded!");
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('user-box').style.display = 'flex';
            showView('setup-view'); // Force user to set up profile
        }
    });

    document.getElementById("login-btn").onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
</script>
</body>
</html>
