<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Soundboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #161b22; border-bottom: 1px solid #30363d; }
        .tab-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .view { padding: 30px; display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; }
        .pfp { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #58a6ff; }
        input, button { display: block; margin-bottom: 10px; width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; }
    </style>
</head>
<body>

<nav>
    <h2 onclick="showView('feed-view')">🎵 Community Sounds</h2>
    <div id="user-controls">
        <button id="login-btn" class="tab-btn">Login with Google</button>
        <div id="user-profile" style="display:none; text-align:right;">
            <span id="username"></span>
            <img id="user-img" class="pfp">
            <button onclick="showView('profile-view')">My Dashboard</button>
        </div>
    </div>
</nav>

<div id="feed-view" class="view" style="display:block;">
    <h1>🔥 Trending Sounds</h1>
    <div id="feed-grid" class="grid"></div>
</div>

<div id="profile-view" class="view">
    <h1>My Community Dashboard</h1>
    <div class="card">
        <h3>Add sounds for your community!</h3>
        <input type="text" id="sName" placeholder="Sound Name">
        <input type="file" id="aFile" accept="audio/*">
        <input type="file" id="iFile" accept="image/*">
        <button onclick="uploadSound()" style="background:#238636;">Upload to My Community</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/storage.js";

    const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Navigation logic
    window.showView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // Auth handle
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('user-profile').style.display = 'block';
            document.getElementById('username').innerText = user.displayName;
            document.getElementById('user-img').src = user.photoURL;
        }
    });
    
    document.getElementById("login-btn").onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

    // Upload logic
    window.uploadSound = async () => {
        const name = document.getElementById('sName').value;
        const aFile = document.getElementById('aFile').files[0];
        const iFile = document.getElementById('iFile').files[0];
        
        const aRef = ref(storage, 'sounds/' + Date.now() + aFile.name);
        const iRef = ref(storage, 'covers/' + Date.now() + iFile.name);
        
        await uploadBytes(aRef, aFile);
        await uploadBytes(iRef, iFile);
        
        await addDoc(collection(db, "sounds"), {
            name, 
            audioUrl: await getDownloadURL(aRef),
            imgUrl: await getDownloadURL(iRef),
            uploader: auth.currentUser.displayName,
            timestamp: Date.now()
        });
        alert("Sound Added!");
    };
</script>
</body>
</html>
