<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Soundboard</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #161b22; }
        .view { padding: 30px; display: none; }
        .active { display: block; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin: 10px; }
        input, button { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 6px; }
    </style>
</head>
<body>

<nav>
    <h2 onclick="showView('home-view')" style="cursor:pointer;">🎵 Soundboard</h2>
    <div id="auth-section">
        <button id="login-btn">Login with Google</button>
    </div>
</nav>

<div id="home-view" class="view active">
    <h1>👥 Creators</h1>
    <div id="creators-grid"></div>
</div>

<script type="module">
    // Correct, working imports for Firebase v10
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIpJ5FFTWp8MmSfVEYbq9-1LfnWXLceT8",
        authDomain: "contcommunitysounds.firebaseapp.com",
        projectId: "contcommunitysounds",
        storageBucket: "contcommunitysounds.firebasestorage.app",
        appId: "1:534535266185:web:dbf16cf4f6c3ca6d614b58"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.showView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    // Attempt Login
    document.getElementById("login-btn").onclick = async () => {
        try {
            await signInWithPopup(auth, new GoogleAuthProvider());
            alert("Login successful!");
        } catch (error) {
            alert("Error: " + error.message);
        }
    };

    // Listen for Auth State
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("auth-section").innerHTML = `<span>Logged in as ${user.displayName}</span>`;
        }
    });

    // Load Data
    onSnapshot(collection(db, "users"), (snap) => {
        const grid = document.getElementById("creators-grid");
        grid.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            grid.innerHTML += `<div class="card"><h3>${d.username}</h3></div>`;
        });
    });
</script>
</body>
</html>
