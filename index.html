<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Soundboard</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #161b22; border-bottom: 1px solid #30363d; }
        .view { padding: 30px; display: none; }
        .active { display: block; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; }
        button { padding: 10px 20px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <h2 onclick="showView('home-view')" style="cursor:pointer;">🎵 Soundboard</h2>
    <div id="auth-box"><button id="login-btn">Login with Google</button></div>
    <div id="user-box" style="display:none;">
        <span id="uName"></span>
        <button onclick="showView('dashboard-view')">My Dashboard</button>
    </div>
</nav>

<div id="home-view" class="view active">
    <h1>👥 Creators</h1>
    <div id="creators-grid"></div>
</div>

<div id="dashboard-view" class="view">
    <div class="card">
        <h1>Dashboard</h1>
        <p>You are logged in!</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIpJ5FFTWp8MmSfVEYbq9-1LfnWXLceT8",
        authDomain: "contcommunitysounds.firebaseapp.com",
        projectId: "contcommunitysounds",
        storageBucket: "contcommunitysounds.firebasestorage.app",
        appId: "1:534535266185:web:dbf16cf4f6c3ca6d614b58"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.showView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('user-box').style.display = 'block';
            document.getElementById('uName').innerText = "Hi, " + user.displayName;
        }
    });

    document.getElementById("login-btn").onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

    onSnapshot(collection(db, "users"), (snap) => {
        const grid = document.getElementById("creators-grid");
        grid.innerHTML = "";
        snap.forEach(doc => {
            grid.innerHTML += `<div class="card"><h3>${doc.data().username}</h3></div>`;
        });
    });
</script>
</body>
</html>
