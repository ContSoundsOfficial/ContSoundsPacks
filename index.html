<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Soundboard</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #161b22; border-bottom: 1px solid #30363d; }
        .view { padding: 30px; display: none; }
        .active { display: block; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #30363d; }
        input, button { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 6px; }
        #user-box { display: flex; align-items: center; gap: 15px; }
        .pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #58a6ff; }
    </style>
</head>
<body>

<nav>
    <h2 onclick="showView('feed-view')" style="cursor:pointer;">🎵 Soundboard</h2>
    <div id="auth-box"><button id="login-btn">Login with Google</button></div>
    <div id="user-box" style="display:none;">
        <span id="uName"></span>
        <img id="uPfp" class="pfp">
        <button onclick="showView('dashboard-view')" style="width:auto;">My Dashboard</button>
    </div>
</nav>

<div id="feed-view" class="view active">
    <h1>🔥 Popular Sounds</h1>
    <div id="feed-grid"></div>
</div>

<div id="dashboard-view" class="view">
    <div class="card">
        <h1>My Community Dashboard</h1>
        <input type="text" id="sName" placeholder="Sound Name">
        <input type="file" id="aFile" accept="audio/*">
        <input type="file" id="iFile" accept="image/*">
        <button onclick="uploadSound()" style="background:#238636;">Upload Sound</button>
    </div>
</div>

<script type="module">
    // FIX: Using standardized, correct Google CDN paths
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    // PASTE YOUR CONFIG HERE
    const firebaseConfig = {
        apiKey: "AIzaSyBIpJ5FFTWp8MmSfVEYbq9-1LfnWXLceT8",
        authDomain: "contcommunitysounds.firebaseapp.com",
        projectId: "contcommunitysounds",
        storageBucket: "contcommunitysounds.firebasestorage.app",
        appId: "1:534535266185:web:dbf16cf4f6c3ca6d614b58"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    window.showView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('user-box').style.display = 'flex';
            document.getElementById('uName').innerText = user.displayName;
            document.getElementById('uPfp').src = user.photoURL;
        }
    });

    document.getElementById("login-btn").onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

    window.uploadSound = async () => {
        const name = document.getElementById('sName').value;
        const aFile = document.getElementById('aFile').files[0];
        const iFile = document.getElementById('iFile').files[0];
        if(!name || !aFile || !iFile) return alert("Upload all files!");
        
        const aRef = ref(storage, 'sounds/' + Date.now() + aFile.name);
        await uploadBytes(aRef, aFile);
        const aUrl = await getDownloadURL(aRef);

        const iRef = ref(storage, 'covers/' + Date.now() + iFile.name);
        await uploadBytes(iRef, iFile);
        const iUrl = await getDownloadURL(iRef);
        
        await addDoc(collection(db, "sounds"), { name, audioUrl: aUrl, imgUrl: iUrl, uploader: auth.currentUser.displayName });
        alert("Sound uploaded!");
    };
</script>
</body>
</html>
