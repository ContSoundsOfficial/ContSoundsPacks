<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d1117;
    color:white;
}

header{
    background:#111827;
    padding:25px;
    text-align:center;
}

header h1{
    font-size:40px;
}

.search{
    width:90%;
    max-width:600px;
    margin:20px auto;
}

.search input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#1f2937;
    color:white;
    font-size:16px;
}

.category{
    width:90%;
    margin:auto;
    margin-bottom:50px;
}

.category h2{
    margin:20px 0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:15px;
}

.sound{
    background:#1f2937;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

button{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#3b82f6;
    color:white;
}

button:hover{
    background:#60a5fa;
}

.download{
    background:#10b981;
}

.download:hover{
    background:#34d399;
}
</style>
</head>

<body>

<header>
<h1>🎵 Soundboard</h1>
</header>

<div class="search">
<input id="search" placeholder="Search sounds...">
</div>

<button onclick="downloadPack()" style="width:90%;margin:0 auto 20px;display:block;padding:12px;background:#f59e0b;border:none;border-radius:10px;">
⬇ Download Full Sound Pack
</button>

<!-- ANIME -->
<div class="category">
<h2>🎌 Anime</h2>
<div class="grid">

<div class="sound">
Ahha
<button onclick="play('AnimeSounds/Ahha.mp3')">Play</button>
<button class="download" onclick="download('AnimeSounds/Ahha.mp3')">Download</button>
</div>

<div class="sound">
Anime Moan
<button onclick="play('AnimeSounds/animemoan.mp3')">Play</button>
<button class="download" onclick="download('AnimeSounds/animemoan.mp3')">Download</button>
</div>

<div class="sound">
Ara Ara
<button onclick="play('AnimeSounds/araara.mp3')">Play</button>
<button class="download" onclick="download('AnimeSounds/araara.mp3')">Download</button>
</div>

</div>
</div>

<!-- SATISFYING -->
<div class="category">
<h2>✨ Satisfying</h2>
<div class="grid">

<div class="sound">
Click
<button onclick="play('Satisfying/Click-Satisfying.mp3')">Play</button>
<button class="download" onclick="download('Satisfying/Click-Satisfying.mp3')">Download</button>
</div>

<div class="sound">
Light Click
<button onclick="play('Satisfying/Light-Click.mp3')">Play</button>
<button class="download" onclick="download('Satisfying/Light-Click.mp3')">Download</button>
</div>

</div>
</div>

<script>
let current = null;

function play(file){
    if(current){
        current.pause();
        current = null;
    }

    current = new Audio(file);
    current.play().catch(e => alert("Audio failed: " + file));
}

function download(file){
    const a = document.createElement("a");
    a.href = file;
    a.download = file.split("/").pop();
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function downloadPack(){
    const a = document.createElement("a");
    a.href = "Soundboard.zip";
    a.download = "Soundboard.zip";
    a.click();
}

document.getElementById("search").addEventListener("input", e=>{
    const v = e.target.value.toLowerCase();
    document.querySelectorAll(".sound").forEach(s=>{
        s.style.display = s.innerText.toLowerCase().includes(v) ? "block" : "none";
    });
});
</script>

</body>
</html>
